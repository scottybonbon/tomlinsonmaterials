<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Tomlinson Materials — Catalog</title>
<style>
:root{--red:#D81F2C;--ink:#1a1a1a;--mut:#6b6b6b;--line:#e3e3e3;--hd:#f6f6f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;color:var(--ink);background:#fff;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}
.ribbon{background:#161616;color:#b9b9b9;font-size:11px;text-align:center;padding:5px 12px;letter-spacing:.01em}
.ribbon b{color:#fff}.ribbon .r{color:#ff5a66;font-weight:bold}
header{display:flex;align-items:center;gap:26px;padding:13px 24px;max-width:1560px;margin:0 auto;position:sticky;top:0;z-index:120;background:#fff;border-bottom:3px solid var(--red)}
.browse{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:bold;color:var(--red);letter-spacing:.03em;cursor:pointer;text-transform:uppercase;flex:0 0 auto}
.browse svg{stroke:var(--red)}
.brandlogo{height:40px;width:auto;flex:0 0 auto}
.hsearch{flex:1;max-width:780px;display:flex;align-items:center;border:2px solid #8a8a8a;border-radius:3px;height:42px}
.hsearch input{flex:1;border:0;padding:0 14px;font-size:15px;outline:none;font-family:inherit;background:transparent}
.hsearch button{border:0;background:transparent;padding:0 13px;cursor:pointer;height:100%;display:flex;align-items:center}
.hutil{margin-left:auto;display:flex;align-items:center;gap:20px;font-size:13px;flex:0 0 auto}
.hutil a:hover{color:var(--red)}.hutil .ord{font-weight:bold;color:var(--red);text-transform:uppercase;letter-spacing:.02em}
.accent{display:none}
.layout{display:flex;max-width:1560px;margin:0 auto;align-items:flex-start}
.catnav{width:218px;flex:0 0 auto;padding:20px 0 50px;position:sticky;top:0;align-self:flex-start}
.catnav h4{font-size:15px;font-weight:bold;padding:0 20px 9px}
.catnav a{display:block;padding:6px 20px;font-size:13px;color:#262626;cursor:pointer;border-left:3px solid transparent}
.catnav a:hover{color:var(--red);border-left-color:var(--red);background:#fafafa}
main{flex:1;min-width:0;padding:18px 26px 70px;border-left:1px solid var(--line)}
.allh{font-size:14px;font-weight:bold;color:#555;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.csec{padding:20px 0 10px;border-bottom:1px solid var(--line)}
.csechd{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.csec h2{font-size:21px;font-weight:bold;color:var(--red);letter-spacing:-.01em}
.cct{font-size:12px;color:var(--mut)}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:4px}
.tile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:9px 5px 13px;cursor:pointer;border:1px solid transparent;border-radius:3px}
.tile:hover{border-color:var(--line);background:#fafafa}
.tile .th{width:80px;height:80px;border:1px solid var(--line);overflow:hidden;background:#f3f3f3;margin-bottom:8px}
.tile .tl{font-size:12px;line-height:1.25;color:#1a1a1a}
.tile:hover .tl{color:var(--red);text-decoration:underline}
.sw{width:100%;height:100%;display:block}
footer{border-top:1px solid var(--line);max-width:1560px;margin:0 auto;padding:16px 24px;font-size:12px;color:var(--mut);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
footer a:hover{color:var(--red)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#161616;color:#fff;padding:11px 20px;border-radius:4px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:100}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){main{border-left:0;padding:14px 16px 50px}.hutil .ph,.hutil .em{display:none}.brandlogo{height:30px}header{gap:12px;padding:10px 14px}.browse span{display:none}.catnav{position:fixed;top:0;left:0;bottom:0;width:82vw;max-width:300px;background:#fff;z-index:300;transform:translateX(-100%);transition:transform .28s ease;overflow-y:auto;box-shadow:2px 0 22px rgba(0,0,0,.2);padding:14px 0 40px}body.menu-open .catnav{transform:none}.mscrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:250}body.menu-open .mscrim{display:block}.mclose{display:block}}
@media(max-width:560px){header{flex-wrap:wrap;gap:10px}.hsearch{order:5;flex:1 0 100%;max-width:none;height:46px}.hutil{gap:14px;margin-left:auto}.ohist,.login{display:none}.tiles{grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:5px}.tile .th{width:86px;height:86px}.ribbon{font-size:10px;padding:5px 10px}}

.pdp{max-width:1560px;margin:0 auto;padding:16px 26px 70px}
.pdpback{font-size:12.5px;color:var(--red);cursor:pointer;font-weight:bold;display:inline-flex;gap:5px;margin-bottom:9px}
.pcrumb{font-size:12px;color:var(--mut);margin-bottom:16px}.pcrumb a{cursor:pointer}.pcrumb a:hover{color:var(--red)}.pcrumb .sep{margin:0 6px;color:#ccc}
.pdptop{display:grid;grid-template-columns:300px 1fr 308px;gap:32px;align-items:start}
.pdpimg{border:1px solid var(--line);background:#f3f3f3;aspect-ratio:1/1;overflow:hidden}
.pdpimg .sw{width:100%;height:100%;display:block}
.pdpmain h1{font-size:27px;font-weight:bold;letter-spacing:-.015em;margin-bottom:4px}
.pdpmain .psub{font-size:14px;color:var(--mut);margin-bottom:13px}
.instock{font-size:13px;font-weight:bold;color:#1B7A3D;margin-bottom:16px}.instock.low{color:#B9560C}
.spectbl{width:100%;border-collapse:collapse;margin-bottom:18px}
.spectbl td{padding:7px 11px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
.spectbl tr:nth-child(odd) td{background:#fafafa}
.spectbl .sl{color:var(--mut);width:42%}.spectbl .sv{font-weight:bold;color:var(--ink)}
.pdesc{font-size:13.5px;color:#333;line-height:1.55;margin-bottom:18px}
.usesb h4,.docsb h4{font-size:11.5px;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:0 0 8px}
.usesb ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.usesb li{font-size:12.5px;background:#f1f1f1;border:1px solid var(--line);border-radius:3px;padding:5px 10px}
.docsb a{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--red);font-weight:bold;margin-right:18px;cursor:pointer}.docsb a:hover{text-decoration:underline}
.buybox{border:1px solid #ccc;border-radius:4px;padding:18px;position:sticky;top:14px;background:#fff}
.pbig{font-size:28px;font-weight:bold;letter-spacing:-.01em;margin-bottom:2px}.pbig span{font-size:14px;color:var(--mut);font-weight:normal}
.tiers{width:100%;border-collapse:collapse;margin:13px 0}
.tiers th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);text-align:left;padding:5px 8px;border-bottom:2px solid var(--line)}
.tiers td{font-size:13px;padding:6px 8px;border-bottom:1px solid var(--line)}.tiers td:last-child{text-align:right;font-weight:bold}
.qrow{display:flex;align-items:center;gap:10px;margin:15px 0 5px}.qrow label{font-size:12.5px;color:var(--mut);font-weight:bold}
.qrow input{width:84px;height:38px;border:1px solid #aaa;border-radius:3px;padding:0 10px;font-size:15px;font-family:inherit}
.lt{font-size:13px;font-weight:bold;color:var(--ink);min-height:17px;margin-bottom:4px}
.addbtn{width:100%;background:var(--red);color:#fff;border:0;font-weight:bold;font-size:15px;padding:13px;border-radius:3px;cursor:pointer;margin-top:8px}.addbtn:hover{background:#b3121e}
.quotebtn{width:100%;background:#fff;border:1px solid #bbb;font-weight:bold;font-size:13px;padding:10px;border-radius:3px;cursor:pointer;margin-top:8px}.quotebtn:hover{border-color:#888}
.qbnote{font-size:13px;color:#333;background:#fafafa;border:1px solid var(--line);border-radius:3px;padding:11px;margin-bottom:11px;line-height:1.45}
.delivn{font-size:11.5px;color:var(--mut);margin-top:12px;line-height:1.45}
.related{margin-top:36px;border-top:1px solid var(--line);padding-top:20px}
.related h3{font-size:16px;font-weight:bold;margin-bottom:13px}
.reltiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:6px}
.reltile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:9px;border:1px solid transparent;border-radius:3px;cursor:pointer;font-size:12px;line-height:1.25}
.reltile:hover{border-color:var(--line);background:#fafafa;color:var(--red)}
.reltile .th{width:82px;height:82px;border:1px solid var(--line);overflow:hidden;margin-bottom:7px}
@media(max-width:1000px){.pdptop{grid-template-columns:1fr}.buybox{position:static}.pdpimg{max-width:320px}.pdp .mbar{display:flex;align-items:center;gap:12px;position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 14px;z-index:140;box-shadow:0 -3px 14px rgba(0,0,0,.09)}.pdp{padding-bottom:94px}}
.mbar{display:none}.mbar .mbp{font-weight:bold;font-size:18px;white-space:nowrap}.mbar .mbp span{font-size:12px;color:var(--mut);font-weight:normal}.mbar .addbtn{width:auto;margin:0;flex:1}
.mclose{display:none;text-align:right;font-size:14px;font-weight:bold;color:var(--mut);cursor:pointer;padding:4px 18px 12px}
</style></head>

function pretty(s){if(!s)return '';
 s=s.replace(/(\d)\s*IN\b/g,'$1"').replace(/(\d)\s*MM\b/g,'$1mm').replace(/(\d)\s*FT\b/g,'$1ft').replace(/(\d)\s*X\s*/gi,'$1 × ');
 return s.split(/\s+/).map(w=>{let up=w.toUpperCase().replace(/[^A-Z/]/g,'');
  if(ABBR[up])return w.replace(new RegExp(up,'i'),ABBR[up]).trim();
  if(ACR.has(w.toUpperCase()))return w.toUpperCase();
  if(/[0-9"×%./-]/.test(w))return w;
  if(w.length<=2)return w.toUpperCase();
  return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
 }).join(' ').replace(/\s+/g,' ').trim();}

 [/HARD ?HAT|\bHAT\b/,'hard hat','hat'],[/GLASS|GOGGLE/,'eyewear','eye'],[/\bBOOT|\bSHOE/,'footwear','cyl'],
 [/SHOVEL/,'shovel','shv'],[/\bBIT\b|BLADE|\bSDS\b|\bSAW\b/,'blade / bit','bld'],

 [/GEOTEX|GEOGRID|FABRIC|GEOTEXTILE/,'geotextile','grd'],[/\bBRASS\b/,'brass fitting','cpl'],
 [/STAINLESS|\bSS\b/,'stainless fitting','cpl'],[/INSUL|STYROFOAM|FOAM/,'insulation','ins'],

const TYPEICON={

 vst:'M9 4 5 7l2 4 2-1v9h6v-9l2 1 2-4-4-3-3 3z',hat:'M3 18a9 9 0 0 1 18 0M3 18h18M9 18V9a3 3 0 0 1 6 0v9M12 6V4',

/* ---- attribute parser ---- */
const MAT_RULES=[[/DUCTILE|\bDI\b/,'DI'],[/\bPVC\b/,'PVC'],[/\bHDPE\b/,'HDPE'],[/SDR\s?(\d+)/,'SDR$1'],
 [/\bSDR\b/,'SDR'],[/C900/,'C900'],[/\bBRASS\b/,'brass'],[/STAINLESS|\bSS\b/,'SS'],[/COPPER/,'copper'],
 [/RUBBER|\bRUB\b/,'rubber'],[/CONCRETE/,'concrete'],[/STEEL/,'steel'],[/\bPE\b|POLY/,'poly'],[/NYLON/,'nylon']];
const JOINT_RULES=[[/\bMJ\b/,'MJ'],[/\bPB\b|PUSH/,'push-on'],[/MEGALUG/,'restrained'],[/\bFLG\b|FLANGE/,'flanged'],
 [/\bNPT\b|THRD|THREAD/,'threaded'],[/TR\s?FLEX/,'TR-Flex'],[/CAMLOCK/,'camlock'],[/\bSW\b/,'socket']];
const COLORHEX={Black:'#2b2b2b',White:'#e9e9e9',Yellow:'#f5c518',Orange:'#ff7a00',Red:'#e23b46',Green:'#1fb060',Blue:'#3b86e8',Grey:'#9a9a9a',Gray:'#9a9a9a',Lime:'#bfe43a',Brown:'#8a5a36',Silver:'#cfcfcf'};
const APPAREL=['XXXL','XXL','3XL','2XL','XL','S/M','L/XL','XS'];
const LOUD_PRIORITY={pipe:['size','angle','length'],water:['size','length'],drain:['size'],safety:['apparel','size'],
 chem:['color','volume','size'],build:['size','length'],tools:['size','length'],hardware:['size','length'],
 site:['size','length'],fleet:['length','size'],office:['size'],sign:['size']};

function parseSpec(p){
 const dep=depOf(p);const u=(p.d||'').toUpperCase();const a={};
 for(const[rx,ty,gl] of TYPE_RULES){if(rx.test(u)){a.type=ty;a.glyph=gl;break;}}
 const dim=u.match(/(\d+)\s*(?:MM)?\s*[Xx]\s*(\d+)(?!\s*DEG)/);
 const mm=u.match(/(\d+(?:\.\d+)?)\s*MM\b/);
 const inch=u.match(/(\d+(?:[ ]\d+)?(?:[./]\d+)?)\s*(?:IN\b|")/);
 const ft=u.match(/(\d+(?:\.\d+)?)\s*(?:FT\b|')/);
 const vol=u.match(/(\d+(?:\.\d+)?)\s*(L|ML|KG|G|OZ)\b/);
 const deg=u.match(/(\d{1,3})(?:[ -](\d)\/(\d))?\s*DEG/);
 if(dim)a.size=dim[1]+' × '+dim[2]+' mm';else if(mm)a.size=mm[1]+' mm';else if(inch)a.size=inch[1].trim()+'"';
 if(ft)a.length=ft[1]+' ft';
 if(vol)a.volume=vol[1]+' '+vol[2].toLowerCase();
 if(deg){let v=parseInt(deg[1]);if(deg[2])v+=parseInt(deg[2])/parseInt(deg[3]);a.angle=(Math.round(v*100)/100)+'°';}
 for(const[rx,m] of MAT_RULES){const mt=u.match(rx);if(mt){a.material=m.replace('$1',mt[1]||'');break;}}
 for(const[rx,j] of JOINT_RULES){if(rx.test(u)){a.joint=j;break;}}
 for(const c in COLORHEX){if(new RegExp('\\b'+c.toUpperCase()+'\\b').test(u)){a.color=c;a.colorhex=COLORHEX[c];break;}}
 if(dep==='safety')for(const s of APPAREL){if(new RegExp('\\b'+s.replace('/','\\/')+'\\b').test(u)){a.apparel=s;break;}}
 // loud value
 a.loud=null;for(const k of (LOUD_PRIORITY[dep]||['size'])){if(a[k]){a.loud=a[k];break;}}
 // pipe: pair size + angle
 if(dep==='pipe'&&a.size&&a.angle)a.loud=a.size+' · '+a.angle;
 a.rich=['loud','material','joint','color','volume','apparel'].filter(k=>a[k]).length;
 return a;
}

/* ---- resolve to display slots (hero never empty) ---- */
function specOf(p){
 const dep=depOf(p);const a=p.isKit?{type:'kit',glyph:'cpl'}:parseSpec(p);
 let hero,sub;
 if(p.isKit){hero='Kit';sub=(p.items?p.items.length:5)+' components';}
 else if(a.loud){hero=a.loud;const s2=[a.type,a.material,a.joint].filter(Boolean);sub=s2.join(' · ')||(GROUPS[p.g]?GROUPS[p.g].n:DEPT[dep].n);}
 else if(a.type){hero=a.type.charAt(0).toUpperCase()+a.type.slice(1);const s2=[a.material,a.joint].filter(Boolean);sub=s2.join(' · ')||(GROUPS[p.g]?GROUPS[p.g].n:DEPT[dep].n);}
 else {const w=(pretty(p.d||'')).split(' ').slice(0,2).join(' ');hero=w||DEPT[dep].n;sub=GROUPS[p.g]?GROUPS[p.g].n:DEPT[dep].n;}
 return {dep,glyphRaw:a.glyph,hero,sub,colorhex:a.colorhex,color:a.color,a};
}
function glyphInner(s){
 if(s.glyphRaw&&TYPEICON[s.glyphRaw])return '<path d="'+TYPEICON[s.glyphRaw]+'"/>';
 if(typeof DICON!=='undefined'&&DICON[DEPT[s.dep].ic])return DICON[DEPT[s.dep].ic];
 return '';
}

/* ---- SVG plate (the product visual) ---- */
function heroSize(s){const n=(''+s).length;if(n<=4)return 60;if(n<=7)return 50;if(n<=11)return 38;if(n<=16)return 28;return 22;}
function plateSVG(p,cls){
 const s=specOf(p);const d=DEPT[s.dep];const h=d.h;const seed=p.id||0;
 const c1='hsl('+h+',44%,52%)',c2='hsl('+((h+24)%360)+',48%,36%)';
 let dots='';for(let i=0;i<5;i++){const x=((seed*(i+3))%88)+6,y=((seed*(i+5))%70)+14,r=2+((seed>>i)%3);dots+='<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="#fff" opacity="0.06"/>';}
 const hero=esc(s.hero);const hs=heroSize(s.hero);
 const sub=esc(s.sub.length>30?s.sub.slice(0,29)+'…':s.sub);
 const chip=s.colorhex?'<circle cx="34" cy="208" r="9" fill="'+s.colorhex+'" stroke="#fff" stroke-opacity="0.6"/>':'';
 const subx=s.colorhex?50:26;
 const gi=glyphInner(s);
 const glyph=gi?'<g transform="translate(24 22) scale(1.9)" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">'+gi+'</g>':'';
 return '<svg class="'+(cls||'')+'" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="'+esc(s.hero+' '+s.sub)+'">'+
  '<defs><linearGradient id="pg'+seed+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+c1+'"/><stop offset="1" stop-color="'+c2+'"/></linearGradient></defs>'+
  '<rect width="300" height="300" fill="url(#pg'+seed+')"/>'+dots+glyph+
  (p.isKit?'<text x="232" y="40" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#fff" opacity="0.85">KIT</text>':'')+
  '<text x="26" y="186" font-family="Inter,Arial,sans-serif" font-size="'+hs+'" font-weight="800" fill="#fff">'+hero+'</text>'+
  chip+'<text x="'+subx+'" y="214" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600" fill="#fff" opacity="0.9">'+sub+'</text>'+
  '<text x="26" y="284" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#fff" opacity="0.82">'+(p.isKit?'KIT':('SKU '+p.id))+'</text>'+
  '<text x="274" y="284" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#fff" opacity="0.72">'+esc((UOMF?UOMF(p.u):(p.u||'ea')).toUpperCase())+'</text>'+
  '</svg>';
}

function artSvg(p){return plateSVG(p,'sw');}
function tile(p){const nm=p.n.replace(/"/g,'&quot;');const pr=p.p!=null?money(p.p)+' / '+ab(p.u):'Request pricing';
 return '<a class="tile" onclick="openProduct('+p.id+')"><div class="th">'+artSvg(p)+'</div><div class="tl">'+p.n+'<span style="display:block;color:#888;font-weight:600;font-size:12px;margin-top:3px">'+pr+'</span></div></a>';}

/* ---- catnav + sections (lazy) ---- */
document.getElementById('catnav').innerHTML='<div class="mclose" onclick="menu(false)">Close ✕</div><h4>Choose a Category</h4>'+CATS.map(c=>'<a onclick="jump(\'sec-'+c.id+'\')">'+c.name+' <span style="color:#bbb;font-weight:600">'+(GRP[c.id]||[]).length+'</span></a>').join('');

const INIT=24; // tiles shown per section before "show all"
function sectionHtml(c){const it=GRP[c.id]||[];const shown=it.slice(0,INIT);
 const more=it.length>INIT?'<div class="showmore"><button onclick="expandSec(\''+c.id+'\')">Show all '+it.length+' products in '+c.name+'</button></div>':'';
 return '<section class="csec" id="sec-'+c.id+'"><div class="csechd"><h2>'+c.name+'</h2><span class="cct">'+it.length+' products</span></div>'+
  '<div style="color:#777;font-size:13.5px;margin:-6px 0 14px;max-width:70ch">'+c.blurb+'</div>'+
  '<div class="tiles" id="tiles-'+c.id+'">'+shown.map(tile).join('')+'</div>'+more+'</section>';}
function renderHome(){document.getElementById('cats').innerHTML=CATS.map(sectionHtml).join('');}
function expandSec(id){const it=GRP[id]||[];document.getElementById('tiles-'+id).innerHTML=it.map(tile).join('');const b=document.querySelector('#sec-'+id+' .showmore');if(b)b.remove();}
renderHome();

/* ---- search ---- */
function doSearch(q){q=q.toLowerCase().trim();showHome();
 if(q.length<2){renderHome();return;}
 const m=PRODUCTS.filter(p=>(p.n+' '+p.d+' '+p.id+' '+CN[p.c]+' '+(GROUPS[p.g]?GROUPS[p.g].n:'')).toLowerCase().indexOf(q)>-1);
 const cap=m.slice(0,300);
 document.getElementById('cats').innerHTML='<section class="csec"><div class="csechd"><h2>Results for “'+q+'”</h2><span class="cct">'+m.length+' product'+(m.length===1?'':'s')+(m.length>300?' · showing first 300':'')+'</span></div><div class="tiles">'+(cap.length?cap.map(tile).join(''):'<div style="color:#888;padding:30px">No products match. Try a SKU, a material like “gloves”, or a category.</div>')+'</div></section>';}
document.getElementById('q').addEventListener('input',function(){doSearch(this.value);});

/* ---- nav helpers ---- */
function jump(id){menu(false);showHome();var q=document.getElementById('q');if(q.value){q.value='';renderHome();}setTimeout(function(){var e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});},60);}
function menu(o){document.body.classList.toggle('menu-open',o);}
function browseClick(){if(window.innerWidth<=900)menu(true);else{showHome();window.scrollTo({top:0,behavior:'smooth'});}}
function toast(t){const el=document.getElementById('tt');el.textContent=t;el.classList.add('on');clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('on'),1800);}
function showHome(){document.getElementById('pdp').style.display='none';document.querySelector('.layout').style.display='flex';}

/* ---- order ---- */
let ORDER=0;
function addOrder(id){const p=BYID[id];const q=+(document.getElementById('pq').value)||0;if(q<=0){toast('Enter a quantity');return;}ORDER++;document.getElementById('ordc').textContent=ORDER;toast(q+' '+ab(p.u)+' · '+p.n+' added to order');}

/* ---- uses copy ---- */
const USES={safety:['Crew daily wear','Site safety compliance','Job-box restock'],pipe:['Watermain & sewer installs','Service connections','Repairs & tie-ins'],water:['Waterworks installs','Hydrant & valve service','Service renewals'],drain:['Catch basin & manhole builds','Storm & subdrain','Grade adjustments'],tools:['Daily site work','Cutting & fastening','Crew tool resupply'],hardware:['Fastening & anchoring','Assembly','Repairs'],build:['Concrete & forming','Framing & blocking','Insulating'],chem:['Cleaning & degreasing','Equipment maintenance','Line & curb marking'],site:['Site prep & layout','Erosion & sediment control','Survey & QC'],fleet:['Fleet upkeep','On-truck consumables','Shop repairs'],office:['Yard & office supply','Facility upkeep','Admin'],sign:['Traffic control','Site signage','Compliance']};

/* ---- PDP ---- */
function openProduct(id){const p=BYID[id];if(!p)return;const isQ=p.o==='quote';const grp=GROUPS[p.g];
 const specs=[['Material No',p.id],['SAP description',p.d],['Department',CN[p.c]],['Product group',grp?grp.n+' · '+p.g:p.g],['Sold by',ab(p.u).toUpperCase()],['Pricing source','SAP · account-specific']];
 const specrows=specs.filter(r=>r[1]).map(r=>'<tr><td class="sl">'+r[0]+'</td><td class="sv">'+r[1]+'</td></tr>').join('');
 const uses=(USES[p.c]||[]).map(u=>'<li>'+u+'</li>').join('');
 const rel=(GRP[p.c]||[]).filter(x=>x.id!==p.id).slice(0,6).map(x=>'<a class="reltile" onclick="openProduct('+x.id+')"><div class="th">'+artSvg(x)+'</div><div>'+x.n+'</div></a>').join('');
 const buy=isQ
   ?'<div class="qbnote">Priced to your account in SAP — request a confirmed price and lead time.</div><button class="addbtn" onclick="toast(\'Quote request started — prototype\')">Request pricing</button><button class="quotebtn" onclick="toast(\'Spec sheet — prototype\')">Download spec sheet (PDF)</button><div class="delivn">Drop-pin delivery to site or Ottawa pickup. A rep confirms price and availability.</div>'
   :'<div class="pbig">'+money(p.p)+' <span>/ '+ab(p.u)+'</span></div><div style="font-size:12px;color:#1B9A50;font-weight:600;margin:4px 0 10px">● Your account price · from SAP</div><div class="qrow"><label>Qty ('+ab(p.u)+')</label><input id="pq" type="number" min="1" value="1"></div><button class="addbtn" onclick="addOrder('+p.id+')">Add to Order</button><button class="quotebtn" onclick="toast(\'Spec sheet — prototype\')">Spec sheet (PDF) · SDS</button><div class="delivn">PO required at checkout · drop-pin delivery to site or Ottawa pickup.</div>';
 document.getElementById('pdp').innerHTML='<div class="pdpback" onclick="showHome()">‹ Back to catalog</div>'+
  '<div class="pcrumb"><a onclick="showHome()">All Categories</a><span class="sep">/</span><a onclick="jump(\'sec-'+p.c+'\')">'+CN[p.c]+'</a><span class="sep">/</span>'+p.n+'</div>'+
  '<div class="pdptop"><div class="pdpimg">'+artSvg(p)+'<div style="font-size:11px;color:#999;margin-top:8px;text-align:center">Product photography is being enriched — image coming soon.</div></div>'+
   '<div class="pdpmain"><h1>'+p.n+'</h1><div class="psub">SAP: '+p.d+' · SKU '+p.id+'</div>'+
   '<div class="instock '+(p.st==='low'?'low':'')+'">'+(p.st==='order'?'● Special order':p.st==='low'?'● Low stock':'● In stock')+' — '+(isQ?'priced on request':'ships from Ottawa')+'</div>'+
   '<table class="spectbl"><tbody>'+specrows+'</tbody></table>'+
   (uses?'<div class="usesb"><h4>Typical uses</h4><ul>'+uses+'</ul></div>':'')+
   '<div class="docsb"><h4>Documents</h4><a onclick="toast(\'Spec sheet — prototype\')">Spec sheet (PDF)</a><a onclick="toast(\'SDS — prototype\')">Safety data sheet</a><a onclick="toast(\'Manufacturer page — prototype\')">Manufacturer page</a></div>'+
   '</div><div class="buybox">'+buy+'</div></div>'+
  (rel?'<div class="related"><h3>Frequently ordered with</h3><div class="reltiles">'+rel+'</div></div>':'')+
  (isQ?'<div class="mbar"><div class="mbp" style="font-size:14px;font-weight:bold">Request pricing</div><button class="addbtn" onclick="toast(\'Quote request — prototype\')">Request pricing</button></div>':'<div class="mbar"><div class="mbp">'+money(p.p)+' <span>/'+ab(p.u)+'</span></div><button class="addbtn" onclick="addOrder('+p.id+')">Add to Order</button></div>');
 document.querySelector('.layout').style.display='none';document.getElementById('pdp').style.display='block';window.scrollTo(0,0);
}
